<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
<meta name="googlebot" content="noindex, nofollow, noarchive, nosnippet, noimageindex">
<title>SYGNODE — Transporte Región de Magallanes</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400;1,500&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:           #FAFAF7;
    --bg-subtle:    #F2EFE9;
    --border:       #D8D4CD;
    --text:         #0A0A0A;
    --text-muted:   #6B6B6B;
    --accent:       #1F2F4A;
    --node:         #1F2F4A;
    --node-critical:#0A0A0A;
    --edge:         #8B8B8B;
    --edge-maritime:#5A6B7A;
    --edge-aerial:  #A8A8A8;
    --state-failed: #8B2942;
    --state-affected:#C4923A;
    --hidden-dep:   #5A3A6B;
    --overlay:      rgba(20,20,20,0.35);
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', -apple-system, system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    height: 100vh;
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  /* HEADER */
  #header {
    height: 60px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 0 32px 0 28px;
    border-bottom: 1px solid var(--border);
    background: var(--bg);
    flex-shrink: 0;
    z-index: 10;
  }

  #logo {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 22px;
    font-weight: 400;
    letter-spacing: 0.04em;
    color: var(--text);
    text-decoration: none;
  }

  #header-label {
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    color: var(--text-muted);
    text-transform: uppercase;
  }

  /* MAIN AREA */
  #main {
    display: flex;
    flex: 1;
    overflow: hidden;
  }

  /* MAP AREA */
  #map-area {
    flex: 1;
    position: relative;
    overflow: hidden;
  }

  #svg-map {
    width: 100%;
    height: 100%;
    display: block;
  }

  /* MENU STRIP */
  #menu-strip {
    width: 40px;
    border-left: 1px solid var(--border);
    background: var(--bg);
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px 0;
    gap: 18px;
    cursor: pointer;
    transition: width 200ms ease;
    overflow: hidden;
    position: relative;
    flex-shrink: 0;
    z-index: 20;
  }

  #menu-strip.expanded {
    width: 280px;
    align-items: flex-start;
    padding: 20px 0;
    gap: 0;
  }

  .menu-num {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 13px;
    font-weight: 400;
    color: var(--text-muted);
    cursor: pointer;
    transition: color 150ms;
    white-space: nowrap;
    padding: 0 4px;
  }

  #menu-strip:not(.expanded) .menu-num:hover { color: var(--accent); }

  #menu-header {
    display: none;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    color: var(--text-muted);
    text-transform: uppercase;
    padding: 0 20px 16px 20px;
    border-bottom: 1px solid var(--border);
    width: 100%;
    white-space: nowrap;
  }

  #menu-strip.expanded #menu-header { display: block; }
  #menu-strip.expanded .menu-num { display: none; }

  .menu-item {
    display: none;
    width: 100%;
    padding: 14px 20px;
    cursor: pointer;
    align-items: flex-start;
    gap: 14px;
    border-left: 2px solid transparent;
    transition: background 150ms, border-color 150ms;
  }

  #menu-strip.expanded .menu-item { display: flex; }

  .menu-item:hover { background: var(--bg-subtle); }
  .menu-item.active { border-left-color: var(--accent); }

  .menu-item-num {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 14px;
    color: var(--text-muted);
    flex-shrink: 0;
    padding-top: 1px;
    min-width: 20px;
  }

  .menu-item-title {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 15px;
    color: var(--text);
    line-height: 1.3;
  }

  /* NODE PANEL */
  #node-panel {
    position: absolute;
    top: 20px;
    right: 60px;
    width: 300px;
    background: white;
    border: 1px solid var(--accent);
    padding: 24px;
    display: none;
    z-index: 30;
  }

  #node-panel.visible { display: block; }

  #node-panel-close {
    position: absolute;
    top: 12px;
    right: 14px;
    font-size: 18px;
    cursor: pointer;
    color: var(--text-muted);
    line-height: 1;
  }
  #node-panel-close:hover { color: var(--text); }

  #node-panel-name {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 24px;
    font-weight: 400;
    line-height: 1.2;
    margin-bottom: 8px;
    padding-right: 20px;
  }

  #node-panel-criticality {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 14px;
  }

  #node-panel-desc {
    font-size: 13px;
    color: var(--text-muted);
    line-height: 1.6;
    margin-bottom: 16px;
  }

  #node-panel-services-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 8px;
  }

  #node-panel-services {
    font-size: 13px;
    line-height: 1.7;
    color: var(--text);
    margin-bottom: 20px;
  }

  #node-panel-services li {
    list-style: none;
    padding-left: 12px;
    position: relative;
  }

  #node-panel-services li::before {
    content: '—';
    position: absolute;
    left: 0;
    color: var(--text-muted);
  }

  #btn-simulate {
    width: 100%;
    padding: 10px;
    background: var(--accent);
    color: white;
    border: none;
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 150ms;
  }
  #btn-simulate:hover { opacity: 0.85; }

  /* SIMULATION BANNER */
  #sim-banner {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    background: var(--bg-subtle);
    border-top: 1px solid var(--accent);
    padding: 14px 24px;
    display: none;
    align-items: center;
    gap: 20px;
    z-index: 25;
  }

  #sim-banner.visible { display: flex; }

  #sim-banner-text {
    flex: 1;
    font-size: 13px;
    line-height: 1.5;
    color: var(--text);
  }

  #sim-banner-text strong {
    font-weight: 500;
  }

  #btn-reset-sim {
    padding: 8px 18px;
    background: transparent;
    border: 1px solid var(--accent);
    color: var(--accent);
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    white-space: nowrap;
    flex-shrink: 0;
    transition: background 150ms, color 150ms;
  }
  #btn-reset-sim:hover { background: var(--accent); color: white; }

  /* MAP CONTROL BUTTONS */
  #map-controls {
    position: absolute;
    bottom: 20px;
    left: 20px;
    display: flex;
    gap: 10px;
    z-index: 25;
  }

  .map-btn {
    padding: 9px 16px;
    background: var(--accent);
    color: white;
    border: none;
    font-family: 'Inter', sans-serif;
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    cursor: pointer;
    transition: opacity 150ms;
  }
  .map-btn:hover { opacity: 0.85; }
  .map-btn.active { background: var(--hidden-dep); }

  #btn-reset-all {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-muted);
  }
  #btn-reset-all:hover { border-color: var(--text-muted); color: var(--text); opacity: 1; }

  /* MODAL OVERLAY */
  #modal-overlay {
    position: fixed;
    inset: 0;
    background: var(--overlay);
    z-index: 100;
    display: none;
    opacity: 0;
    transition: opacity 200ms;
  }
  #modal-overlay.visible { display: block; }
  #modal-overlay.fade-in { opacity: 1; }

  /* SLIDE POPUP */
  #slide-popup {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    width: 720px;
    max-height: 85vh;
    background: white;
    border: 1px solid var(--accent);
    z-index: 101;
    display: none;
    flex-direction: column;
    overflow: hidden;
  }

  #slide-popup.visible { display: flex; }

  #popup-header {
    display: flex;
    align-items: center;
    justify-content: flex-end;
    padding: 18px 24px 0 24px;
    gap: 16px;
    flex-shrink: 0;
  }

  #popup-counter-top {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 14px;
    color: var(--text-muted);
    margin-right: auto;
  }

  #popup-close {
    font-size: 20px;
    cursor: pointer;
    color: var(--text-muted);
    line-height: 1;
    padding: 2px 6px;
  }
  #popup-close:hover { color: var(--text); }

  #popup-body {
    flex: 1;
    overflow-y: auto;
    padding: 20px 48px 32px 48px;
    scrollbar-width: thin;
    scrollbar-color: var(--border) transparent;
  }

  #popup-body::-webkit-scrollbar { width: 4px; }
  #popup-body::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .slide-label {
    font-size: 11px;
    font-weight: 500;
    letter-spacing: 0.12em;
    text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 18px;
  }

  .slide-title {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 38px;
    font-weight: 400;
    line-height: 1.2;
    color: var(--text);
    margin-bottom: 24px;
  }

  .slide-title em {
    font-style: italic;
  }

  .slide-body {
    font-size: 15px;
    line-height: 1.65;
    color: #2A2A2A;
    margin-bottom: 20px;
  }

  .slide-quote {
    border-left: 3px solid var(--accent);
    padding: 12px 0 12px 20px;
    margin: 20px 0;
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 22px;
    font-style: italic;
    font-weight: 400;
    line-height: 1.4;
    color: var(--text);
  }

  .slide-block {
    border: 1px solid var(--border);
    padding: 16px 20px;
    margin: 20px 0;
    font-size: 15px;
    line-height: 1.6;
    color: var(--text);
  }

  .slide-block-accent {
    border: 1px solid var(--accent);
    padding: 14px 20px;
    margin: 20px 0;
    font-size: 13px;
    font-weight: 500;
    letter-spacing: 0.04em;
    color: var(--accent);
    text-transform: uppercase;
    letter-spacing: 0.08em;
  }

  .slide-cols {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin: 16px 0;
  }

  .slide-col-item {
    padding: 14px 16px;
    border: 1px solid var(--border);
  }

  .slide-col-item strong {
    display: block;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 6px;
  }

  .slide-col-item p {
    font-size: 14px;
    color: #2A2A2A;
    line-height: 1.5;
  }

  .slide-rows {
    display: flex;
    flex-direction: column;
    gap: 12px;
    margin: 16px 0;
  }

  .slide-row-item {
    display: flex;
    gap: 16px;
    align-items: flex-start;
    padding: 14px 16px;
    border: 1px solid var(--border);
  }

  .slide-row-item strong {
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    color: var(--accent);
    flex-shrink: 0;
    min-width: 160px;
    padding-top: 1px;
  }

  .slide-row-item p {
    font-size: 14px;
    color: #2A2A2A;
    line-height: 1.5;
  }

  .slide-footer {
    font-size: 12px;
    color: var(--text-muted);
    margin-top: 16px;
    line-height: 1.5;
  }

  .slide-three-blocks {
    display: flex;
    flex-direction: column;
    gap: 0;
    margin: 16px 0;
    border: 1px solid var(--border);
  }

  .slide-three-block {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }

  .slide-three-block:last-child { border-bottom: none; }

  .slide-three-block strong {
    display: block;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: var(--accent);
    margin-bottom: 6px;
  }

  .slide-three-block p {
    font-size: 14px;
    color: #2A2A2A;
    line-height: 1.5;
  }

  #popup-footer {
    display: flex;
    align-items: center;
    padding: 14px 24px;
    border-top: 1px solid var(--border);
    flex-shrink: 0;
  }

  .popup-nav-btn {
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 500;
    letter-spacing: 0.08em;
    color: var(--accent);
    background: none;
    border: none;
    cursor: pointer;
    padding: 6px 10px;
    transition: opacity 150ms;
    text-transform: uppercase;
  }

  .popup-nav-btn:disabled { color: var(--border); cursor: default; }
  .popup-nav-btn:not(:disabled):hover { opacity: 0.7; }

  #popup-counter-bottom {
    flex: 1;
    text-align: center;
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 14px;
    color: var(--text-muted);
  }

  /* TOOLTIP */
  #tooltip {
    position: fixed;
    background: white;
    border: 1px solid var(--hidden-dep);
    padding: 10px 14px;
    font-size: 13px;
    color: var(--text);
    line-height: 1.5;
    max-width: 260px;
    pointer-events: none;
    z-index: 200;
    display: none;
  }

  /* PULSE ANIMATION for failed node */
  @keyframes pulse-ring {
    0%   { r: 18; opacity: 0.7; }
    50%  { r: 24; opacity: 0.3; }
    100% { r: 18; opacity: 0.7; }
  }

  .pulse-circle {
    animation: pulse-ring 2s ease-in-out infinite;
  }

  @media (hover: none), (pointer: coarse), (max-width: 900px) {
    html,
    body {
      height: auto;
      min-height: 100%;
      overflow-x: hidden;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      touch-action: pan-y;
    }

    #main {
      min-height: calc(100vh - 60px);
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      touch-action: pan-y;
    }
  }
</style>
</head>

<!-- HEADER -->
<header id="header">
  <a id="logo" href="https://www.sygnode.cl" target="_blank" rel="noopener">SYGNODE.</a>
  <div id="header-label">Transporte — Región de Magallanes</div>
</header>

<!-- MAIN -->
<div id="main">
  <!-- MAP AREA -->
  <div id="map-area">
    <svg id="svg-map" viewBox="0 0 1000 800" preserveAspectRatio="xMidYMid meet">
      <defs>
        <marker id="arrow" markerWidth="6" markerHeight="6" refX="5" refY="3" orient="auto">
          <path d="M0,0 L0,6 L6,3 z" fill="var(--edge)" />
        </marker>
      </defs>

      <!-- GEOGRAPHY LABELS -->
      <text x="430" y="340" font-family="'Cormorant Garamond',Georgia,serif" font-style="italic"
            font-size="11" fill="#C8C4BD" opacity="0.6" letter-spacing="3" text-anchor="middle"
            transform="rotate(-5,430,340)">ESTRECHO DE MAGALLANES</text>
      <text x="620" y="500" font-family="'Cormorant Garamond',Georgia,serif" font-style="italic"
            font-size="11" fill="#C8C4BD" opacity="0.5" letter-spacing="3" text-anchor="middle"
            transform="rotate(-8,620,500)">TIERRA DEL FUEGO</text>
      <text x="640" y="660" font-family="'Cormorant Garamond',Georgia,serif" font-style="italic"
            font-size="10" fill="#C8C4BD" opacity="0.5" letter-spacing="2" text-anchor="middle"
            transform="rotate(-5,640,660)">CANAL BEAGLE</text>

      <!-- COAST SUGGESTION LINE -->
      <path d="M 340,350 Q 380,355 430,345 Q 480,335 520,330 Q 560,325 600,340 Q 630,350 660,360"
            stroke="#E0DDD6" stroke-width="1" fill="none" opacity="0.6"/>
      <path d="M 460,620 Q 500,610 550,615 Q 600,620 650,640 Q 680,650 700,660"
            stroke="#E0DDD6" stroke-width="1" fill="none" opacity="0.5"/>

      <!-- EDGES group (drawn first, behind nodes) -->
      <g id="edges-layer"></g>

      <!-- HIDDEN DEPENDENCY LINES -->
      <g id="hidden-dep-layer" style="display:none"></g>

      <!-- NODES group -->
      <g id="nodes-layer"></g>
    </svg>

    <!-- NODE PANEL -->
    <div id="node-panel">
      <span id="node-panel-close">×</span>
      <div id="node-panel-name"></div>
      <div id="node-panel-criticality"></div>
      <div id="node-panel-desc"></div>
      <div id="node-panel-services-label">Servicios que pasan por aquí</div>
      <ul id="node-panel-services"></ul>
      <button id="btn-simulate">Simular caída</button>
    </div>

    <!-- MAP CONTROLS -->
    <div id="map-controls">
      <button class="map-btn" id="btn-hidden-deps">Mostrar dependencias ocultas</button>
      <button class="map-btn" id="btn-reset-all">Restablecer todo</button>
    </div>

    <!-- SIMULATION BANNER -->
    <div id="sim-banner">
      <div id="sim-banner-text"></div>
      <button id="btn-reset-sim">Restablecer</button>
    </div>
  </div>

  <!-- MENU STRIP -->
  <div id="menu-strip">
    <div id="menu-header">Estructura de la reunión</div>
    <!-- collapsed numbers injected by JS -->
    <!-- expanded items injected by JS -->
  </div>
</div>

<!-- MODAL OVERLAY -->
<div id="modal-overlay"></div>

<!-- SLIDE POPUP -->
<div id="slide-popup">
  <div id="popup-header">
    <span id="popup-counter-top"></span>
    <span id="popup-close">×</span>
  </div>
  <div id="popup-body"></div>
  <div id="popup-footer">
    <button class="popup-nav-btn" id="btn-prev">← Anterior</button>
    <div id="popup-counter-bottom"></div>
    <button class="popup-nav-btn" id="btn-next">Siguiente →</button>
  </div>
</div>

<!-- TOOLTIP -->
<div id="tooltip"></div>

function getNode(id) { return NODES.find(n => n.id === id); }

function getNodeEl(id) { return document.getElementById('node-g-' + id); }

function fmt(n) { return String(n).padStart(2, '0'); }

// BFS to find affected nodes when a node is removed
function getAffectedNodes(removedId) {
  // Build adjacency from remaining nodes
  const remaining = NODES.map(n => n.id).filter(id => id !== removedId);
  const adj = {};
  remaining.forEach(id => adj[id] = []);
  EDGES.forEach(e => {
    if (e.from !== removedId && e.to !== removedId) {
      if (adj[e.from] !== undefined && adj[e.to] !== undefined) {
        adj[e.from].push(e.to);
        adj[e.to].push(e.from);
      }
    }
  });

  // Find the largest connected component including Punta Arenas (pa) as root
  // Nodes not in that component are "affected" (isolated)
  const root = remaining.includes('pa') ? 'pa' : remaining[0];
  if (!root) return remaining;

  const visited = new Set();
  const queue = [root];
  visited.add(root);
  while (queue.length) {
    const cur = queue.shift();
    (adj[cur] || []).forEach(nb => {
      if (!visited.has(nb)) { visited.add(nb); queue.push(nb); }
    });
  }

  return remaining.filter(id => !visited.has(id));
}

// ============================================================
// RENDER GRAPH
// ============================================================

function getNodeRadius(node) {
  if (node.criticality === 'critical') return 14;
  if (node.criticality === 'high')     return 10;
  return 7;
}

function getEdgeStyle(mode) {
  if (mode === 'maritime') return { stroke: '#5A6B7A', strokeWidth: 1.5, dasharray: '6,4' };
  if (mode === 'aerial')   return { stroke: '#A8A8A8', strokeWidth: 1,   dasharray: '2,5' };
  return { stroke: '#8B8B8B', strokeWidth: 1.5, dasharray: '' };
}

function renderGraph() {
  const edgesLayer = document.getElementById('edges-layer');
  const nodesLayer = document.getElementById('nodes-layer');

  edgesLayer.innerHTML = '';
  nodesLayer.innerHTML = '';

  // EDGES
  EDGES.forEach(edge => {
    const from = getNode(edge.from);
    const to   = getNode(edge.to);
    if (!from || !to) return;

    const style = getEdgeStyle(edge.mode);
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('id', `edge-${edge.from}-${edge.to}`);
    line.setAttribute('x1', from.x); line.setAttribute('y1', from.y);
    line.setAttribute('x2', to.x);   line.setAttribute('y2', to.y);
    line.setAttribute('stroke', style.stroke);
    line.setAttribute('stroke-width', style.strokeWidth);
    if (style.dasharray) line.setAttribute('stroke-dasharray', style.dasharray);
    line.setAttribute('stroke-linecap', 'round');
    edgesLayer.appendChild(line);
  });

  // NODES
  NODES.forEach(node => {
    const g = document.createElementNS('http://www.w3.org/2000/svg', 'g');
    g.setAttribute('id', 'node-g-' + node.id);
    g.setAttribute('class', 'node-group');
    g.style.cursor = 'pointer';

    const r = getNodeRadius(node);
    const fill = node.criticality === 'critical' ? '#0A0A0A' : '#1F2F4A';
    const opacity = node.criticality === 'medium' ? '0.85' : '1';

    // Outer ring for airport/transfer types
    if (node.type === 'airport' || node.type === 'transfer') {
      const ring = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
      ring.setAttribute('cx', node.x); ring.setAttribute('cy', node.y);
      ring.setAttribute('r', r + 4);
      ring.setAttribute('fill', 'none');
      ring.setAttribute('stroke', '#1F2F4A');
      ring.setAttribute('stroke-width', '1');
      ring.setAttribute('opacity', '0.5');
      g.appendChild(ring);
    }

    // Main circle
    const circle = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    circle.setAttribute('id', 'node-circle-' + node.id);
    circle.setAttribute('cx', node.x); circle.setAttribute('cy', node.y);
    circle.setAttribute('r', r);
    circle.setAttribute('fill', fill);
    circle.setAttribute('opacity', opacity);
    circle.setAttribute('stroke', '#1F2F4A');
    circle.setAttribute('stroke-width', node.criticality === 'critical' ? '2' : '0');
    g.appendChild(circle);

    // Label
    const text = document.createElementNS('http://www.w3.org/2000/svg', 'text');
    text.setAttribute('id', 'node-label-' + node.id);
    text.setAttribute('x', node.x);
    text.setAttribute('y', node.y + r + 13);
    text.setAttribute('text-anchor', 'middle');
    text.setAttribute('font-family', "'Inter', sans-serif");
    text.setAttribute('font-size', '10');
    text.setAttribute('fill', '#0A0A0A');
    text.textContent = node.name;
    g.appendChild(text);

    // Events
    g.addEventListener('mouseenter', () => onNodeHover(node.id, true));
    g.addEventListener('mouseleave', () => onNodeHover(node.id, false));
    g.addEventListener('click', (e) => { e.stopPropagation(); onNodeClick(node.id); });
    g.addEventListener('dblclick', (e) => { e.stopPropagation(); onNodeDblClick(node.id); });

    nodesLayer.appendChild(g);
  });

  renderHiddenDeps();
}

function renderHiddenDeps() {
  const layer = document.getElementById('hidden-dep-layer');
  layer.innerHTML = '';

  HIDDEN_DEPENDENCIES.forEach((dep, i) => {
    const n1 = getNode(dep.pair[0]);
    const n2 = getNode(dep.pair[1]);
    const nt = getNode(dep.target);
    if (!n1 || !n2 || !nt) return;

    // Line between pair
    const line = document.createElementNS('http://www.w3.org/2000/svg', 'line');
    line.setAttribute('x1', n1.x); line.setAttribute('y1', n1.y);
    line.setAttribute('x2', n2.x); line.setAttribute('y2', n2.y);
    line.setAttribute('stroke', '#5A3A6B');
    line.setAttribute('stroke-width', '1.5');
    line.setAttribute('stroke-dasharray', '3,3');
    layer.appendChild(line);

    // Mid circle tooltip trigger
    const mx = (n1.x + n2.x) / 2;
    const my = (n1.y + n2.y) / 2;
    const mc = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    mc.setAttribute('cx', mx); mc.setAttribute('cy', my);
    mc.setAttribute('r', 5);
    mc.setAttribute('fill', '#5A3A6B');
    mc.style.cursor = 'pointer';
    mc.addEventListener('mouseenter', (e) => showTooltip(e, dep.label));
    mc.addEventListener('mousemove', (e) => moveTooltip(e));
    mc.addEventListener('mouseleave', hideTooltip);
    layer.appendChild(mc);

    // Target node ring
    const ring = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    ring.setAttribute('id', 'hidden-dep-ring-' + i);
    ring.setAttribute('cx', nt.x); ring.setAttribute('cy', nt.y);
    ring.setAttribute('r', getNodeRadius(nt) + 7);
    ring.setAttribute('fill', 'none');
    ring.setAttribute('stroke', '#5A3A6B');
    ring.setAttribute('stroke-width', '1');
    ring.setAttribute('stroke-dasharray', '3,2');
    layer.appendChild(ring);
  });
}

// INTERACTIONS
// ============================================================

function onNodeHover(id, entering) {
  const node = getNode(id);
  if (!node) return;

  const circle = document.getElementById('node-circle-' + id);
  const label  = document.getElementById('node-label-' + id);
  const r = getNodeRadius(node);

  if (entering) {
    circle.setAttribute('r', r * 1.22);
    if (label) label.setAttribute('font-weight', '600');

    // Highlight connected edges
    EDGES.forEach(e => {
      if (e.from === id || e.to === id) {
        const line = document.getElementById(`edge-${e.from}-${e.to}`);
        if (line) {
          line.setAttribute('stroke', '#1F2F4A');
          line.setAttribute('stroke-width', parseFloat(line.getAttribute('stroke-width')) + 0.5);
        }
      }
    });
  } else {
    circle.setAttribute('r', r);
    if (label) label.removeAttribute('font-weight');

    // Restore edges (unless simulating)
    if (!state.simulatedNode) {
      EDGES.forEach(e => {
        if (e.from === id || e.to === id) {
          const s = getEdgeStyle(e.mode);
          const line = document.getElementById(`edge-${e.from}-${e.to}`);
          if (line) {
            line.setAttribute('stroke', s.stroke);
            line.setAttribute('stroke-width', s.strokeWidth);
          }
        }
      });
    }
  }
}

function onNodeClick(id) {
  state.selectedNode = id;
  openNodePanel(id);
}

function onNodeDblClick(id) {
  simulateFail(id);
}

function openNodePanel(id) {
  const node = getNode(id);
  if (!node) return;

  document.getElementById('node-panel-name').textContent = node.name;

  const critMap = { critical: 'Crítico', high: 'Alto', medium: 'Medio' };
  document.getElementById('node-panel-criticality').textContent = critMap[node.criticality] || node.criticality;

  document.getElementById('node-panel-desc').textContent = node.description;

  const ul = document.getElementById('node-panel-services');
  ul.innerHTML = '';
  node.services.forEach(s => {
    const li = document.createElement('li');
    li.textContent = s;
    ul.appendChild(li);
  });

  document.getElementById('node-panel').classList.add('visible');
}

function closeNodePanel() {
  document.getElementById('node-panel').classList.remove('visible');
  state.selectedNode = null;
}

function simulateFail(id) {
  // Reset previous
  resetSimulation(false);

  state.simulatedNode = id;
  const node = getNode(id);

  // Style failed node
  const circle = document.getElementById('node-circle-' + id);
  if (circle) circle.setAttribute('fill', '#8B2942');

  // Add pulse ring
  const g = getNodeEl(id);
  if (g) {
    const pulse = document.createElementNS('http://www.w3.org/2000/svg', 'circle');
    pulse.setAttribute('id', 'pulse-' + id);
    pulse.setAttribute('cx', node.x); pulse.setAttribute('cy', node.y);
    pulse.setAttribute('r', getNodeRadius(node) + 4);
    pulse.setAttribute('fill', 'none');
    pulse.setAttribute('stroke', '#8B2942');
    pulse.setAttribute('stroke-width', '1.5');
    pulse.setAttribute('class', 'pulse-circle');
    g.insertBefore(pulse, g.firstChild);
  }

  // Grey out edges connected to failed node
  EDGES.forEach(e => {
    if (e.from === id || e.to === id) {
      const line = document.getElementById(`edge-${e.from}-${e.to}`);
      if (line) {
        line.setAttribute('stroke', '#D8D4CD');
        line.setAttribute('stroke-dasharray', '4,4');
      }
    }
  });

  // Find affected nodes
  const affected = getAffectedNodes(id);
  state.affectedNodes = affected;

  affected.forEach(aid => {
    const ac = document.getElementById('node-circle-' + aid);
    if (ac) ac.setAttribute('fill', '#C4923A');
  });

  // Show banner
  const banner = document.getElementById('sim-banner');
  const affectedNames = affected.map(aid => getNode(aid)?.name).filter(Boolean).join(', ');
  document.getElementById('sim-banner-text').innerHTML =
    `<strong>Caída simulada: ${node.name}.</strong> ${affected.length > 0 ? `Localidades con conectividad afectada: ${affectedNames}.` : 'No se detectan localidades aisladas — el sistema tiene rutas alternativas.'} La conectividad al nodo afectado queda interrumpida o significativamente degradada.`;
  banner.classList.add('visible');

  closeNodePanel();
}

function resetSimulation(full = true) {
  if (state.simulatedNode) {
    const id = state.simulatedNode;
    const node = getNode(id);
    const fill = node?.criticality === 'critical' ? '#0A0A0A' : '#1F2F4A';
    const circle = document.getElementById('node-circle-' + id);
    if (circle) circle.setAttribute('fill', fill);

    const pulse = document.getElementById('pulse-' + id);
    if (pulse) pulse.remove();

    EDGES.forEach(e => {
      if (e.from === id || e.to === id) {
        const s = getEdgeStyle(e.mode);
        const line = document.getElementById(`edge-${e.from}-${e.to}`);
        if (line) {
          line.setAttribute('stroke', s.stroke);
          line.setAttribute('stroke-width', s.strokeWidth);
          if (s.dasharray) line.setAttribute('stroke-dasharray', s.dasharray);
          else line.removeAttribute('stroke-dasharray');
        }
      }
    });

    state.affectedNodes.forEach(aid => {
      const aNode = getNode(aid);
      const af = aNode?.criticality === 'critical' ? '#0A0A0A' : '#1F2F4A';
      const ac = document.getElementById('node-circle-' + aid);
      if (ac) ac.setAttribute('fill', af);
    });

    state.simulatedNode = null;
    state.affectedNodes = [];
  }

  document.getElementById('sim-banner').classList.remove('visible');

  if (full) {
    closeNodePanel();
  }
}

function resetAll() {
  resetSimulation(true);
  if (state.hiddenDepsVisible) toggleHiddenDeps();
  closeSlidePopup();
  collapseMenu();
}

function toggleHiddenDeps() {
  state.hiddenDepsVisible = !state.hiddenDepsVisible;
  const layer = document.getElementById('hidden-dep-layer');
  const btn   = document.getElementById('btn-hidden-deps');
  layer.style.display = state.hiddenDepsVisible ? 'block' : 'none';
  btn.textContent = state.hiddenDepsVisible ? 'Ocultar dependencias' : 'Mostrar dependencias ocultas';
  btn.classList.toggle('active', state.hiddenDepsVisible);
}

function buildMenu() {
  const strip = document.getElementById('menu-strip');

  // Collapsed numbers
  SLIDES.forEach((_, i) => {
    const num = document.createElement('div');
    num.className = 'menu-num';
    num.textContent = fmt(i + 1);
    num.addEventListener('click', (e) => {
      e.stopPropagation();
      if (!state.menuExpanded) expandMenu();
      else openSlide(i);
    });
    strip.appendChild(num);
  });

  // Expanded items
  SLIDES.forEach((_, i) => {
    const item = document.createElement('div');
    item.className = 'menu-item';
    item.id = 'menu-item-' + i;
    item.innerHTML = `<span class="menu-item-num">${fmt(i+1)}</span><span class="menu-item-title">${MENU_TITLES[i]}</span>`;
    item.addEventListener('click', (e) => { e.stopPropagation(); openSlide(i); });
    strip.appendChild(item);
  });
}

function expandMenu() {
  state.menuExpanded = true;
  document.getElementById('menu-strip').classList.add('expanded');
}

function collapseMenu() {
  state.menuExpanded = false;
  document.getElementById('menu-strip').classList.remove('expanded');
}

function openSlide(index) {
  state.activeSlide = index;
  renderSlide(index);

  // Show overlay with fade
  const overlay = document.getElementById('modal-overlay');
  overlay.classList.add('visible');
  requestAnimationFrame(() => overlay.classList.add('fade-in'));

  document.getElementById('slide-popup').classList.add('visible');

  // Mark active menu item
  document.querySelectorAll('.menu-item').forEach((el, i) => {
    el.classList.toggle('active', i === index);
  });

  collapseMenu();
}

function renderSlide(index) {
  const slide = SLIDES[index];
  const total = SLIDES.length;
  const counter = `${fmt(index+1)} / ${fmt(total)}`;

  document.getElementById('popup-counter-top').textContent = counter;
  document.getElementById('popup-counter-bottom').textContent = counter;

  document.getElementById('popup-body').innerHTML = `
    <div class="slide-label">${slide.label}</div>
    <div class="slide-title">${slide.title}</div>
    ${slide.body}
  `;

  document.getElementById('btn-prev').disabled = index === 0;
  document.getElementById('btn-next').disabled = index === total - 1;
}

function closeSlidePopup() {
  document.getElementById('slide-popup').classList.remove('visible');
  const overlay = document.getElementById('modal-overlay');
  overlay.classList.remove('fade-in');
  setTimeout(() => overlay.classList.remove('visible'), 200);
  state.activeSlide = null;
  document.querySelectorAll('.menu-item').forEach(el => el.classList.remove('active'));
}

function navigateSlide(dir) {
  if (state.activeSlide === null) return;
  const next = state.activeSlide + dir;
  if (next < 0 || next >= SLIDES.length) return;
  openSlide(next);
}

// ============================================================
// TOOLTIP
// ============================================================

function showTooltip(e, text) {
  const tip = document.getElementById('tooltip');
  tip.textContent = text;
  tip.style.display = 'block';
  moveTooltip(e);
}

function moveTooltip(e) {
  const tip = document.getElementById('tooltip');
  tip.style.left = (e.clientX + 14) + 'px';
  tip.style.top  = (e.clientY - 10) + 'px';
}

function hideTooltip() {
  document.getElementById('tooltip').style.display = 'none';
}

// ============================================================
// EVENT BINDINGS
// ============================================================

function bindEvents() {
  // Menu strip toggle
  document.getElementById('menu-strip').addEventListener('click', (e) => {
    if (!state.menuExpanded) expandMenu();
    else collapseMenu();
  });

  // Click outside menu collapses it
  document.getElementById('map-area').addEventListener('click', () => {
    if (state.menuExpanded) collapseMenu();
  });

  // Node panel close
  document.getElementById('node-panel-close').addEventListener('click', closeNodePanel);

  // Simulate button
  document.getElementById('btn-simulate').addEventListener('click', () => {
    if (state.selectedNode) simulateFail(state.selectedNode);
  });

  // Reset simulation
  document.getElementById('btn-reset-sim').addEventListener('click', () => resetSimulation(true));

  // Hidden deps toggle
  document.getElementById('btn-hidden-deps').addEventListener('click', toggleHiddenDeps);

  // Reset all
  document.getElementById('btn-reset-all').addEventListener('click', resetAll);

  // Popup close
  document.getElementById('popup-close').addEventListener('click', closeSlidePopup);

  // Overlay close
  document.getElementById('modal-overlay').addEventListener('click', closeSlidePopup);

  // Popup nav
  document.getElementById('btn-prev').addEventListener('click', () => navigateSlide(-1));
  document.getElementById('btn-next').addEventListener('click', () => navigateSlide(+1));

  // Keyboard
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      if (state.activeSlide !== null) closeSlidePopup();
      else if (state.menuExpanded) collapseMenu();
    }
    if (state.activeSlide !== null) {
      if (e.key === 'ArrowLeft')  navigateSlide(-1);
      if (e.key === 'ArrowRight') navigateSlide(+1);
    }
  });

  // Stop popup clicks from bubbling to overlay
  document.getElementById('slide-popup').addEventListener('click', (e) => e.stopPropagation());
}

// ============================================================
// INIT
// ============================================================

(function init() {
  renderGraph();
  buildMenu();
  bindEvents();
})();
</script>
</body>
